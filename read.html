    <style>
      .read-page {
        max-width: 760px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        z-index: 2;
        align-self: center;
      }

      .read-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .read-back:hover {
        background: rgba(255,255,255,1);
        box-shadow: 0 4px 12px rgba(68,94,139,0.12);
      }

      .read-card {
        margin-top: 1rem;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--surface-strong);
        padding: clamp(1.2rem, 4vw, 2.4rem);
        overflow: hidden;
        min-width: 0;
      }

      .read-card .badge-row {
        margin-top: 0;
        margin-bottom: 1rem;
      }

      .read-card h1 {
        margin: 0 0 0.6rem;
        font-size: clamp(1.4rem, 4vw, 2.1rem);
        line-height: 1.22;
        color: var(--text);
      }

      .read-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 1.4rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.86rem;
      }

      .read-body {
        font-size: 1.05rem;
        line-height: 1.82;
        color: #3a5278;
        padding: 0;
        border: none;
        word-break: break-word;
        overflow-wrap: break-word;
      }
      /* Override Quill ql-editor defaults for read page */
      .read-body.ql-editor {
        padding: 0;
        border: none;
        font-size: 1.05rem;
        line-height: 1.82;
        color: #3a5278;
        font-family: "Outfit", sans-serif;
      }
      .read-body h1, .read-body h2, .read-body h3, .read-body h4 { color: var(--text); margin-top: 1.4rem; margin-bottom: .4rem; }
      .read-body p { margin: .7rem 0; }
      .read-body ul, .read-body ol { padding-left: 1.6rem; margin: .6rem 0; }
      .read-body li { margin: .25rem 0; }
      .read-body pre { background: rgba(221,235,255,.6); border-radius: 10px; padding: .8rem; font-size: .88rem; white-space: pre-wrap; }
      .read-body blockquote { border-left: 3px solid var(--brand-2); padding-left: .9rem; color: var(--muted); margin: .6rem 0; font-style: italic; }
      .read-body a { color: var(--brand-2); }

      .read-tags {
        margin-top: 1.6rem;
        padding-top: 1rem;
        border-top: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .read-skeleton {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        padding: 1.5rem;
      }

      .skel {
        border-radius: 8px;
        background: linear-gradient(90deg, rgba(97,126,177,0.12) 25%, rgba(97,126,177,0.22) 50%, rgba(97,126,177,0.12) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }

      .skel-title { height: 36px; width: 75%; }
      .skel-meta  { height: 18px; width: 40%; }
      .skel-line  { height: 16px; width: 100%; }
      .skel-line.short { width: 60%; }

      @keyframes shimmer {
        from { background-position: 200% 0; }
        to   { background-position: -200% 0; }
      }

      .read-error {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--muted);
      }

      .read-error h2 { margin: 0 0 0.5rem; color: var(--text); }

      /* ── Project detail styles ── */
      .proj-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.4rem;
      }

      .proj-link-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.48rem 1rem;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        transition: 0.2s ease;
        border: 1px solid transparent;
      }

      .proj-link-btn svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .proj-live   { background: linear-gradient(115deg,#3cc8a7,#5f8eff); color:#fff; }
      .proj-github { background: #24292e; color: #fff; }
      .proj-output { background: linear-gradient(115deg,#8b5cf6,#ec4899); color: #fff; }
      .proj-link-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.18); }

      .proj-section-label {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 1.4rem 0 0.5rem;
      }

      .proj-code-wrap {
        margin-top: 1.6rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
      }

      .proj-tabs {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        background: rgba(221,235,255,0.45);
        border-bottom: 1px solid var(--line);
        gap: 0;
      }

      .proj-tabs::-webkit-scrollbar { display: none; }

      .proj-tab {
        flex-shrink: 0;
        padding: 0.55rem 1rem;
        font-size: 0.82rem;
        font-weight: 500;
        font-family: Consolas, monospace;
        color: var(--muted);
        background: transparent;
        border: none;
        border-right: 1px solid var(--line);
        cursor: pointer;
        transition: 0.18s ease;
        white-space: nowrap;
      }

      .proj-tab:hover { background: rgba(95,142,255,0.08); color: var(--text); }

      .proj-tab.active {
        background: rgba(255,255,255,0.9);
        color: var(--brand-2);
        font-weight: 700;
        border-bottom: 2px solid var(--brand-2);
      }

      .proj-panel { display: none; }
      .proj-panel.active { display: block; }

      .proj-code-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.8rem;
        background: rgba(221,235,255,0.3);
        border-bottom: 1px solid var(--line);
      }

      .proj-code-filename {
        font-size: 0.78rem;
        font-family: Consolas, monospace;
        color: var(--muted);
        flex: 1;
      }

      .proj-copy-btn, .proj-dl-btn {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.26rem 0.65rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.8);
        color: #2d446f;
        cursor: pointer;
        transition: 0.18s ease;
        white-space: nowrap;
      }

      .proj-copy-btn:hover { background: rgba(95,142,255,0.12); border-color: rgba(95,142,255,0.3); }
      .proj-dl-btn:hover   { background: rgba(60,200,167,0.12); border-color: rgba(60,200,167,0.3); }

      .proj-pre {
        margin: 0;
        padding: 1rem;
        overflow-x: auto;
        background: rgba(240,246,255,0.6);
        max-height: 480px;
        overflow-y: auto;
      }

      .proj-pre code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.86rem;
        color: #1a355f;
        line-height: 1.6;
        white-space: pre;
      }
    </style>
